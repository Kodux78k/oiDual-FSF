<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>UNO — Monólito Dual V5 — KODUX</title>
    
    <!-- External Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #050812;
            --surface: rgba(15, 23, 42, 0.7);
            --surface-bright: rgba(30, 41, 59, 0.8);
            --accent: #38bdf8;
            --secondary: #00f2ff;
            --success: #10b981;
            --danger: #ef4444;
            --mut: #94a3b8;
            --bd: 1px solid rgba(255, 255, 255, 0.08);
            --r: 20px;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            --tabsH: 80px;
            --primary-gradient: linear-gradient(135deg, #00f2ff, #0066ff);
            --neon-purple: #a855f7;
            --neon-cyan: #00f2ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        html, body { 
            height: 100%; margin: 0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            color: #f1f5f9; 
            background: var(--bg);
            overflow: hidden;
            user-select: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        body {
            background: radial-gradient(circle at top right, #0c1e35, #050812);
        }

        /* Ambient Blobs */
        .ambient-light { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .blob { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); opacity: 0.15; }
        .blob-1 { background: var(--secondary); top: -100px; right: -100px; }
        .blob-2 { background: var(--neon-purple); bottom: -100px; left: -100px; }

        /* App Container */
        #app-container { height: 100%; display: flex; flex-direction: column; position: relative; z-index: 10; }

        #viewport {
            flex: 1; overflow-y: auto; padding: 20px;
            padding-bottom: 120px; scroll-behavior: smooth;
        }

        .view { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        header.vision-header {
            display: flex; justify-content: space-between; align-items: center; padding-bottom: 25px;
        }
        .vision-brand {
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px;
        }
        .vision-brand span { color: var(--secondary); font-weight: 400; font-size: 0.8rem; margin-left: 4px; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: var(--bd);
            border-radius: var(--r); padding: 20px; margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* Apps Grid */
        .apps-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 20px;
        }
        .app-item {
            background: var(--surface); border: var(--bd); border-radius: var(--r);
            padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .app-item:hover {
            background: var(--surface-bright); transform: translateY(-5px); border-color: var(--secondary);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.1);
        }
        .app-item i {
            font-size: 24px; margin-bottom: 10px; background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .app-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Sessions & Stack */
        .session-window {
            background: #000; border: var(--bd); border-radius: var(--r); margin-bottom: 20px;
            overflow: hidden; display: flex; flex-direction: column;
        }
        .win-hdr {
            padding: 12px 16px; background: rgba(30, 41, 59, 0.5);
            display: flex; align-items: center; justify-content: space-between;
        }
        .win-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .win-controls { display: flex; gap: 8px; }
        .win-controls button {
            width: 28px; height: 28px; border-radius: 50%; border: 0; background: rgba(255,255,255,0.05); color: white; cursor: pointer;
        }
        .win-controls button.close:hover { background: var(--danger); }
        .win-frame { width: 100%; height: 500px; border: 0; background: #000; }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--tabsH);
            background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(25px); border-top: var(--bd);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--mut); cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--secondary); }
        .nav-item span { font-size: 9px; font-weight: 800; letter-spacing: 1px; }

        /* Terminal */
        #terminal {
            font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--success);
            background: #000; padding: 15px; border-radius: 12px; height: 300px; overflow-y: auto;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Orb Menu */
        .orb-trigger {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: var(--primary-gradient); border-radius: 50%;
            display: grid; place-items: center; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="ambient-light">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="orb-trigger" id="orbToggle">
        <i class="fa-solid fa-brain" style="color: #000;"></i>
    </div>

    <div id="app-container">
        
        <div id="viewport">
            
            <!-- HOME VIEW -->
            <section id="view-home" class="view">
                <header class="vision-header">
                    <div class="vision-brand">MONOLITH<span>DUAL V5</span></div>
                    <div style="font-size: 10px; font-weight: 800; color: var(--secondary); letter-spacing: 1px;">KODUX NODE 01</div>
                </header>

                <div class="glass-card" style="border-left: 4px solid var(--secondary);">
                    <div style="display:flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-size: 9px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 4px; font-weight: 800;">KERNEL STATUS</div>
                            <div style="font-size: 15px; font-weight: 800; font-family: 'Orbitron';">Trinity Engine: Active</div>
                        </div>
                        <div id="clock" style="font-family: 'JetBrains Mono'; font-weight: bold; color: var(--secondary)">00:00:00</div>
                    </div>
                </div>

                <div class="apps-grid" id="apps-container">
                    <!-- Apps inject via JS -->
                </div>
            </section>

            <!-- STACK VIEW -->
            <section id="view-stack" class="view hidden">
                <header class="vision-header">
                    <div class="vision-brand">PROCESS<span>STACK</span></div>
                    <button onclick="clearAll()" style="background:transparent; border:1px solid var(--danger); color:var(--danger); border-radius:8px; font-size:9px; padding:6px 12px; font-weight: bold; cursor:pointer;">KILL ALL</button>
                </header>
                <div id="stack-container">
                    <!-- Sessions inject here -->
                </div>
            </section>

            <!-- LOGS VIEW -->
            <section id="view-logs" class="view hidden">
                <header class="vision-header">
                    <div class="vision-brand">SYSTEM<span>LOGS</span></div>
                </header>
                <div id="terminal"></div>
            </section>

        </div>

        <!-- NAVIGATION -->
        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchView('home', this)">
                <i class="fa-solid fa-grip-vertical"></i>
                <span>HOME</span>
            </div>
            <div class="nav-item" onclick="switchView('stack', this)">
                <i class="fa-solid fa-ghost"></i>
                <span>STACK</span>
            </div>
            <div class="nav-item" onclick="switchView('logs', this)">
                <i class="fa-solid fa-terminal"></i>
                <span>LOGS</span>
            </div>
        </nav>

    </div>

    <script>
        const APPS = [
            { id: 'atlas', name: 'Atlas Strategic', icon: 'fa-satellite', url: 'https://duckduckgo.com' },
            { id: 'serena', name: 'Serena AI', icon: 'fa-leaf', url: 'https://wikipedia.org' },
            { id: 'solus', name: 'Solus Arcana', icon: 'fa-gem', url: 'https://bing.com' },
            { id: 'kodux', name: 'Kodux Lab', icon: 'fa-flask-vial', url: 'https://example.com' },
            { id: 'lumine', name: 'Lumine', icon: 'fa-bolt', url: 'https://www.google.com/search?q=news' },
            { id: 'vortex', name: 'Vortex CRM', icon: 'fa-hurricane', url: 'https://duckduckgo.com/?q=crm' }
        ];

        let state = {
            activeSessions: [],
            currentView: 'home'
        };

        // Initialize UI
        function init() {
            renderApps();
            updateClock();
            setInterval(updateClock, 1000);
            log("Monolith Kernel V5 Initialized.");
            log("Dual Trinity Protocol: ENGAGED.");
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }

        function log(msg) {
            const term = document.getElementById('terminal');
            if (!term) return;
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.innerHTML = `<span style="opacity:0.4">[${time}]</span> <span style="color:#fff">></span> ${msg}`;
            term.prepend(entry);
        }

        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            state.currentView = viewId;
            log(`Navigation: Switched to ${viewId.toUpperCase()}`);
        }

        function renderApps() {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            APPS.forEach(app => {
                const item = document.createElement('div');
                item.className = 'app-item';
                item.innerHTML = `
                    <i class="fa-solid ${app.icon}"></i>
                    <span>${app.name}</span>
                `;
                item.onclick = () => openApp(app);
                container.appendChild(item);
            });
        }

        function openApp(app) {
            const sid = 'proc_' + Math.random().toString(36).substr(2, 5);
            const session = { ...app, sid, status: 'active' };
            state.activeSessions.push(session);
            
            renderStack();
            switchView('stack', document.querySelectorAll('.nav-item')[1]);
            log(`Process Created: ${app.name} (${sid})`);
        }

        function renderStack() {
            const container = document.getElementById('stack-container');
            if (state.activeSessions.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; opacity: 0.2; padding: 60px 20px;">
                        <i class="fa-solid fa-layer-group" style="font-size: 40px; margin-bottom: 15px;"></i>
                        <p style="font-size: 11px; letter-spacing: 1px; font-weight: 800;">IDLE: NO ACTIVE PROCESSES</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            state.activeSessions.forEach(session => {
                const win = document.createElement('div');
                win.className = 'session-window';
                win.id = session.sid;
                win.innerHTML = `
                    <div class="win-hdr">
                        <div class="win-title">
                            <i class="fa-solid ${session.icon}" style="color:var(--secondary)"></i>
                            ${session.name}
                        </div>
                        <div class="win-controls">
                            <button class="close" onclick="closeApp('${session.sid}')"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                    <iframe class="win-frame" src="${session.url}"></iframe>
                `;
                container.appendChild(win);
            });
        }

        function closeApp(sid) {
            state.activeSessions = state.activeSessions.filter(x => x.sid !== sid);
            renderStack();
            log(`Process Terminated: ${sid}`);
        }

        function clearAll() {
            state.activeSessions = [];
            renderStack();
            log(`Kernel Emergency: All processes purged.`);
        }

        window.onload = init;
    </script>
</body>
</html>
